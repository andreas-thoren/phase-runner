{% extends "base.html" %}
{% load static %}

{% block title %}Upload Workouts{% endblock %}

{% block app_class %}narrow-page{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{% static 'workouts/css/workouts.css' %}">
{% endblock %}

{% block scripts %}
  <script type="module" src="{% static 'workouts/js/fit_upload.js' %}" defer></script>
{% endblock %}

{% block main %}
  <h1>Upload .fit files</h1>

  <div id="upload-container"
       data-upload-url="{% url 'workouts:upload_workouts_api' %}"
       data-csrf-token="{{ csrf_token }}"
       data-sdk-url="{% static 'workouts/js/fit-sdk.js' %}">

    <input type="file" id="fit-file-input" multiple accept=".fit">

    <div id="parse-status" hidden></div>

    <figure id="preview-figure" class="overflow-auto" hidden>
      <table class="record-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Activity</th>
            <th>Name</th>
            <th>Duration</th>
            <th>Distance</th>
            <th>Avg HR</th>
          </tr>
        </thead>
        <tbody id="preview-body"></tbody>
      </table>
    </figure>

    <nav id="preview-pagination" aria-label="Pagination" hidden>
      <ul></ul>
    </nav>

    <div id="upload-actions" class="button-row" hidden>
      <input type="file" id="csv-file-input" accept=".csv" hidden>
      <button type="button" id="csv-import-btn" class="secondary">Import names from CSV</button>
      <button type="button" id="upload-btn">Upload</button>
    </div>

    <dialog id="csv-dialog">
      <article>
        <header>
          <button id="csv-dialog-close" aria-label="Close" rel="prev"></button>
          <h3>CSV Column Mapping</h3>
        </header>
        <label for="csv-name-col">Name column</label>
        <select id="csv-name-col"></select>
        <label for="csv-datetime-col">Datetime column</label>
        <select id="csv-datetime-col"></select>
<footer>
          <button id="csv-dialog-cancel" class="secondary">Cancel</button>
          <button id="csv-dialog-apply">Apply</button>
        </footer>
      </article>
    </dialog>

    <div id="upload-results" hidden></div>
  </div>
{% endblock %}
