<div class="list-toolbar">
  <button id="export-csv" class="icon-btn icon-btn--swap secondary" type="button"
          data-export-url="{% url 'workouts:export_workouts' %}"
          aria-label="Export CSV" title="Export CSV">
    {% include "workouts/partials/cloud-download.svg" %}
    {% include "workouts/partials/cloud-download-fill.svg" %}
  </button>
  <button id="toggle-filters" class="icon-btn secondary" type="button"
          aria-label="Filter options{% if filter_querystring %} (active){% endif %}"
          title="Filter options{% if filter_querystring %} (active){% endif %}">
    {% if filter_querystring %}
      {% include "workouts/partials/filter-applied.svg" %}
    {% else %}
      {% include "workouts/partials/filter.svg" %}
    {% endif %}
  </button>
</div>

<form method="get" class="filter-bar" id="filter-bar" {% if not show_filters %}hidden{% endif %}>
  <button type="button" class="filter-close" data-filter-close aria-label="Close filters">
    {% include "workouts/partials/close.svg" %}
  </button>
  <div class="filter-fields">
    <label>
      From
      {{ filter_form.date_from }}
    </label>
    <label>
      To
      {{ filter_form.date_to }}
    </label>
    <label>
      Activity
      {{ filter_form.activity }}
    </label>
    <label>
      Status
      {{ filter_form.status }}
    </label>
  </div>
  <div class="button-row">
    <button type="button" class="secondary" id="filter-clear" {% if not filter_querystring %}disabled{% endif %} data-clear-url="{{ request.path }}">Clear</button>
    <button type="submit" id="filter-submit" {% if not filter_querystring %}disabled{% endif %}>Filter</button>
  </div>
</form>
