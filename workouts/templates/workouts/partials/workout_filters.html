<div class="list-toolbar">
  <button id="export-csv" class="secondary button-slim" type="button"
          data-export-url="{% url 'workouts:export_workouts' %}">Export CSV</button>
  <button id="toggle-filters" class="secondary button-slim" type="button">Filter Options</button>
</div>

<form method="get" class="filter-bar" id="filter-bar" {% if not show_filters %}hidden{% endif %}>
  <div class="filter-fields">
    <label>
      From
      {{ filter_form.date_from }}
    </label>
    <label>
      To
      {{ filter_form.date_to }}
    </label>
    <label>
      Activity
      {{ filter_form.activity }}
    </label>
    <label>
      Status
      {{ filter_form.status }}
    </label>
  </div>
  <div class="button-row">
    <input type="hidden" name="show_filters" value="1">
    <button type="button" class="secondary" id="filter-clear" {% if not filter_querystring %}disabled{% endif %} data-clear-url="{{ request.path }}">Clear</button>
    <button type="submit" id="filter-submit" {% if not filter_querystring %}disabled{% endif %}>Filter</button>
  </div>
</form>
