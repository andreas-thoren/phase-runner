{% if summary_stats %}
  <figure class="overflow-auto summary-stats-figure">
    <table class="summary-table summary-stats-table">
      <thead>
        <tr>
          <th class="th-group-planned" colspan="{{ summary_stats_colspan }}">Summary stats<sup>1</sup></th>
        </tr>
        <tr>
          <th>Avg<sup>2</sup> {{ col_sessions|lower }}</th>
          <th>Avg<sup>2</sup> {{ col_distance|lower }}</th>
          <th>Longest {{ col_long|lower }}</th>
          <th>Total {{ col_distance|lower }}</th>
          {% if summary_stats.zone_distribution %}<th>Z1</th><th>Z2</th><th>Z3</th><th>Z4</th><th>Z5</th>{% endif %}
          <th>Avg<sup>2</sup> X</th>
          <th>Avg<sup>2</sup> Str</th>
        </tr>
      </thead>
      <tbody>
        <tr class="meso-group-start">
          <td data-label="Avg² {{ col_sessions|lower }}">{{ summary_stats.avg_sessions|floatformat:"1" }}</td>
          <td data-label="Avg² {{ col_distance|lower }}">{{ summary_stats.avg_distance|floatformat:"1" }}</td>
          <td data-label="Longest {{ col_long|lower }}">{{ summary_stats.longest_distance|floatformat:"-1" }}</td>
          <td data-label="Total {{ col_distance|lower }}">{{ summary_stats.total_distance|floatformat:"-1" }}</td>
          {% if summary_stats.zone_distribution %}<td data-label="Z1">{{ summary_stats.zone_distribution.0 }}</td><td data-label="Z2">{{ summary_stats.zone_distribution.1 }}</td><td data-label="Z3">{{ summary_stats.zone_distribution.2 }}</td><td data-label="Z4">{{ summary_stats.zone_distribution.3 }}</td><td data-label="Z5">{{ summary_stats.zone_distribution.4 }}</td>{% endif %}
          <td data-label="Avg² X">{{ summary_stats.avg_cross|floatformat:"1" }}</td>
          <td data-label="Avg² Str">{{ summary_stats.avg_strength|floatformat:"1" }}</td>
        </tr>
      </tbody>
    </table>
    <figcaption class="summary-stats-caption">
      1) Summary of completed workouts until {{ summary_stats_cutoff|date:"Y-m-d" }}<br>
      2) 7 day average<br>
      All distances in km{% if summary_stats.zone_distribution %}<br>
      Z1–Z5: % of {{ primary_sport_label }} time per HR zone{% endif %}
    </figcaption>
  </figure>
{% else %}
  <p class="summary-stats-empty">No completed workouts yet.</p>
{% endif %}
